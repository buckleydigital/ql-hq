<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; object-src 'none'; base-uri 'self';">
<title>VA Panel · QuoteLeads</title>
<link rel="icon" href="data:,">
<style>
  :root{--bg:#15151b;--bg2:#1b1b22;--card:#1f1f27;--bd:#2c2c38;--ink:#eeeef3;--ink2:#a7a7b8;--ink3:#72728a;--accent:#4797ff;--grn:#10b981;--amb:#f59e0b;--red:#ef4444;--r:10px}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5}
  a{color:var(--accent)}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 16px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
  .topbar h1{font-size:18px;margin:0;display:flex;align-items:center;gap:10px}
  .pill{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:100px;background:rgba(71,151,255,.14);color:var(--accent);border:1px solid rgba(71,151,255,.3)}
  .btn{font:inherit;font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);color:var(--ink);cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .muted{color:var(--ink3)}
  .empty{padding:28px;text-align:center;color:var(--ink3)}
  .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.03em}
  .badge.managed{background:rgba(245,158,11,.14);color:var(--amb);border:1px solid rgba(245,158,11,.3)}
  .badge.ppl{background:rgba(16,185,129,.14);color:var(--grn);border:1px solid rgba(16,185,129,.3)}
  .badge.other{background:rgba(160,160,184,.14);color:var(--ink2);border:1px solid var(--bd)}
  .client-row{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
  .client-row:hover{border-color:var(--accent)}
  .client-name{font-weight:600;font-size:15px}
  .stat-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--ink2)}
  .stat-row b{color:var(--ink)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--bd);vertical-align:top}
  th{color:var(--ink3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin:18px 0 8px;font-weight:600}
  .kv{display:flex;gap:8px;padding:4px 0;font-size:13px}
  .kv .k{color:var(--ink3);min-width:120px}
  textarea{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;color:var(--ink);font:inherit;font-size:13px;padding:10px;resize:vertical;min-height:64px}
  textarea:focus{outline:none;border-color:var(--accent)}
  .note{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:8px}
  .note-meta{font-size:11px;color:var(--ink3);margin-top:6px}
  .gate{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--ink3)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>VA Panel <span class="pill">Virtual Assistant</span></h1>
    <button class="btn" id="logoutBtn" type="button">Log out</button>
  </div>

  <div id="gate" class="gate">Loading…</div>

  <!-- CLIENT LIST -->
  <div id="listView" class="hidden">
    <p class="muted" id="listSub" style="margin-top:0">Clients assigned to you.</p>
    <div id="clientList"></div>
  </div>

  <!-- CLIENT DETAIL -->
  <div id="detailView" class="hidden">
    <button class="btn" id="backBtn" type="button" style="margin-bottom:14px">← All clients</button>
    <div id="detailBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script>
  const SUPABASE_URL = 'https://wjadekgptkstfdootuol.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqYWRla2dwdGtzdGZkb290dW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTc3NzQsImV4cCI6MjA5MDU3Mzc3NH0.g45wqe_F9KHh3TVzkq8LimxxT4UiuTZpJZcWkzzD7IM';
  let sb;

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtMoney = (v) => v != null ? '$' + Number(v).toLocaleString('en-AU', {minimumFractionDigits:0, maximumFractionDigits:2}) : '—';
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-AU', {day:'numeric', month:'short', year:'numeric'}) : '—';
  const planBadge = (p) => { const k = p === 'managed' ? 'managed' : p === 'ppl' ? 'ppl' : 'other'; const label = p === 'managed' ? 'Managed' : p === 'ppl' ? 'PPL' : (p || '—'); return `<span class="badge ${k}">${esc(label)}</span>`; };

  async function vaApi(body) {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { location.href = 'index.html'; throw new Error('no session'); }
    const res = await fetch(SUPABASE_URL + '/functions/v1/va-api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token, 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  }

  async function init() {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { location.href = 'index.html'; return; }
    $('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); location.href = 'index.html'; });
    $('backBtn').addEventListener('click', showList);
    loadClients();
  }

  let _clients = [];
  async function loadClients() {
    const { ok, status, data } = await vaApi({ action: 'list_clients' });
    if (!ok) {
      // Not a VA → send them to the normal dashboard.
      if (status === 403) { location.href = 'dashboard.html'; return; }
      $('gate').textContent = 'Could not load your clients. ' + (data.error || '');
      return;
    }
    _clients = data.clients || [];
    $('gate').classList.add('hidden');
    showList();
  }

  function showList() {
    $('detailView').classList.add('hidden');
    $('listView').classList.remove('hidden');
    const el = $('clientList');
    if (!_clients.length) { el.innerHTML = '<div class="card empty">No clients assigned to you yet.</div>'; return; }
    $('listSub').textContent = `${_clients.length} client${_clients.length !== 1 ? 's' : ''} assigned to you.`;
    el.innerHTML = _clients.map(c => `
      <div class="card client-row" data-id="${esc(c.id)}">
        <div>
          <div class="client-name">${esc(c.name || '(no name)')} ${planBadge(c.plan)}</div>
          <div class="stat-row">
            <span><b>${c.delivered || 0}/${c.totalLeads || 0}</b> leads</span>
            <span><b>${c.activeOrders || 0}</b> active order${c.activeOrders === 1 ? '' : 's'}</span>
            <span><b>${c.notes || 0}</b> note${c.notes === 1 ? '' : 's'}</span>
            ${c.email ? `<span class="muted">${esc(c.email)}</span>` : ''}
          </div>
        </div>
        <span class="muted">View →</span>
      </div>`).join('');
    el.querySelectorAll('.client-row').forEach(r => r.addEventListener('click', () => openClient(r.dataset.id)));
  }

  async function openClient(companyId) {
    $('detailBody').innerHTML = '<div class="card empty">Loading…</div>';
    $('listView').classList.add('hidden');
    $('detailView').classList.remove('hidden');
    window.scrollTo(0, 0);
    const { ok, data } = await vaApi({ action: 'get_client', company_id: companyId });
    if (!ok) { $('detailBody').innerHTML = `<div class="card empty">${esc(data.error || 'Could not load client.')}</div>`; return; }
    renderDetail(companyId, data);
  }

  function renderDetail(companyId, d) {
    const c = d.company || {};
    const contacts = (d.contacts || []).map(p => `
      <div class="kv"><span class="k">${esc(p.full_name || '(no name)')}${p.role ? ' · ' + esc(p.role) : ''}</span>
        <span>${p.email ? `<a href="mailto:${esc(p.email)}">${esc(p.email)}</a>` : ''}${p.phone ? ' · ' + esc(p.phone) : ''}</span></div>`).join('') || '<div class="muted">No contacts on file.</div>';

    const leadOrders = (d.lead_orders || []).length ? `
      <table><thead><tr><th>Niche</th><th>Area</th><th>Qty</th><th>Delivered</th><th>$/lead</th><th>Status</th><th>Date</th></tr></thead><tbody>
      ${d.lead_orders.map(o => `<tr><td>${esc(o.niche || '—')}</td><td>${esc(o.area || '—')}</td><td>${o.quantity || 0}</td><td>${o.delivered_count || 0}/${o.quantity || 0}</td><td>${fmtMoney(o.price_per_lead)}</td><td>${esc(o.status || '—')}</td><td>${fmtDate(o.created_at)}</td></tr>`).join('')}
      </tbody></table>` : '<div class="muted">No lead orders.</div>';

    const orders = (d.orders || []).length ? `
      <table><thead><tr><th>Total</th><th>Delivered</th><th>Status</th><th>Due</th><th>Notes</th></tr></thead><tbody>
      ${d.orders.map(o => `<tr><td>${o.total_leads || 0}</td><td>${o.delivered_leads || 0}/${o.total_leads || 0}</td><td>${esc(o.status || '—')}</td><td>${fmtDate(o.due_date)}</td><td>${esc(o.notes || '—')}</td></tr>`).join('')}
      </tbody></table>` : '<div class="muted">No fulfilment orders.</div>';

    const notes = (d.notes || []).map(n => `
      <div class="note">${esc(n.body)}<div class="note-meta">${esc(n.author_name || 'Unknown')} · ${fmtDate(n.created_at)}</div></div>`).join('') || '<div class="muted" id="noNotes">No notes yet.</div>';

    $('detailBody').innerHTML = `
      <div class="card">
        <div class="client-name" style="font-size:18px">${esc(c.name || '(no name)')} ${planBadge(c.plan)}</div>
        <div class="sec-title">Contact</div>
        <div class="kv"><span class="k">Company email</span><span>${c.email ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : '—'}</span></div>
        <div class="kv"><span class="k">Company phone</span><span>${esc(c.phone || '—')}</span></div>
        <div class="kv"><span class="k">Website</span><span>${c.domain ? `<a href="${esc(c.domain)}" target="_blank" rel="noopener">${esc(c.domain)}</a>` : '—'}</span></div>
        <div class="sec-title">People</div>
        ${contacts}
      </div>

      <div class="card">
        <div class="sec-title" style="margin-top:0">Lead orders</div>
        ${leadOrders}
        <div class="sec-title">Fulfilment orders</div>
        ${orders}
      </div>

      <div class="card">
        <div class="sec-title" style="margin-top:0">Notes</div>
        <div id="notesList">${notes}</div>
        <textarea id="noteInput" placeholder="Add an internal note about this client…"></textarea>
        <div style="margin-top:8px"><button class="btn btn-p" id="addNoteBtn" type="button">Add note</button></div>
      </div>`;

    $('addNoteBtn').addEventListener('click', () => addNote(companyId));
  }

  async function addNote(companyId) {
    const ta = $('noteInput');
    const body = ta.value.trim();
    if (!body) return;
    const btn = $('addNoteBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const { ok, data } = await vaApi({ action: 'add_note', company_id: companyId, body });
    btn.disabled = false; btn.textContent = 'Add note';
    if (!ok) { alert(data.error || 'Could not save note.'); return; }
    const n = data.note;
    const list = $('notesList');
    const noNotes = $('noNotes'); if (noNotes) noNotes.remove();
    const div = document.createElement('div');
    div.className = 'note';
    div.innerHTML = `${esc(n.body)}<div class="note-meta">${esc(n.author_name || 'You')} · ${fmtDate(n.created_at)}</div>`;
    list.insertBefore(div, list.firstChild);
    ta.value = '';
    // keep the cached count roughly in sync
    const c = _clients.find(x => x.id === companyId); if (c) c.notes = (c.notes || 0) + 1;
  }

  window.addEventListener('DOMContentLoaded', () => {
    if (window.supabase) init();
    else { const s = document.querySelector('script[src*="supabase-js"]'); s.addEventListener('load', init); }
  });
</script>
</body>
</html>
